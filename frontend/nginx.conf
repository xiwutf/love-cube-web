server {
    listen 80;
    server_name xifg.com.cn www.xifg.com.cn;

    root /var/www/lovecube;
    index index.html;

    charset utf-8;
    charset_types text/html text/css application/javascript application/json text/javascript;

    # Hash 路由模式：所有请求直接返回 index.html（Vite build 产物）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 若 H5 与后端同域部署，代理 /admin 到后端（可选）
    # location /admin {
    #     proxy_pass http://127.0.0.1:8090;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
