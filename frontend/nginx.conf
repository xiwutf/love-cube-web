server {
    listen 443 ssl;
    server_name lovecube.xifg.com.cn;
    client_max_body_size 50m;

    root /var/www/lovecube;
    index index.html;

    charset utf-8;
    charset_types text/css application/javascript application/json text/javascript;

    # Hash 路由模式：所有请求直接返回 index.html（Vite build 产物）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 同域部署：将 /admin 代理到 Spring Boot（8090）
    # 后端 context-path=/admin，因此这里不做 URI 重写，原样透传
    location ^~ /admin/ {
        # 预检请求直接返回，避免被上游拦截成 405
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    ssl_certificate /etc/letsencrypt/live/lovecube.xifg.com.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lovecube.xifg.com.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name lovecube.xifg.com.cn;
    return 301 https://$host$request_uri;
}
