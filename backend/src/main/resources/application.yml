server:
  address: 0.0.0.0
  port: 8090
  servlet:
    context-path: /admin

jwt:
  secret: 9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c6b5d4e1f7a2
  expiration: 864000000  # 10 days in milliseconds

spring:
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
    
  datasource:
    url: jdbc:mysql://rm-2zereaqi1k536nd38zo.mysql.rds.aliyuncs.com:3306/lovecube?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: xifg
    password: Lj962464!
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 13
    validate-on-migrate: true
    # 由 FlywayRepairMigrationStrategyConfig 读取：先 repair 再 migrate。checksum 对齐后请改 false
    repair-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1

  session:
    store-type: none  # 暂时禁用 Redis session 存储

  cache:
    type: none  # 暂时禁用 Redis 缓存

  security:
    user:
      name: admin
      password: admin123

logging:
  level:
    root: warn
    com.lovecube: info
    org.springframework.web: warn
  file:
    name: logs/love-cube.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

wechat:
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}
  api:
    login:
      path: /api/wechat/login

lovecube:
  admin:
    # 工作台 /api/admin/stats 聚合结果内存缓存秒数；0 表示不缓存（多实例各自 JVM 内生效）
    dashboard-stats-cache-seconds: 45
  fellowship:
    # 暂关 VIP 付费能力时，喜欢/访客名单不对非 VIP 用户隐藏
    vip-commerce-enabled: false
    growth-backfill:
      # 设为 true 时应用启动后自动执行一次历史用户成长/徽章补偿
      on-startup: false
